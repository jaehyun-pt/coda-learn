<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코다 배우기 🦉</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --green: #58cc02;
  --green-dark: #46a302;
  --green-light: #d7ffb8;
  --blue: #1cb0f6;
  --blue-dark: #0f8bc4;
  --blue-light: #ddf4ff;
  --yellow: #ffc800;
  --yellow-dark: #e6b000;
  --yellow-light: #fff9c4;
  --red: #ff4b4b;
  --red-light: #ffdfe0;
  --orange: #ff9600;
  --purple: #ce82ff;
  --purple-dark: #a560e8;
  --bg: #f8f9fa;
  --white: #ffffff;
  --gray-100: #f7f7f7;
  --gray-200: #e5e5e5;
  --gray-300: #afafaf;
  --gray-500: #777777;
  --gray-700: #4b4b4b;
  --gray-900: #1f1f1f;
  --shadow: 0 4px 0 rgba(0,0,0,0.12);
  --shadow-sm: 0 2px 0 rgba(0,0,0,0.1);
  --radius: 16px;
  --radius-sm: 12px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--gray-900);
  min-height: 100vh;
}

/* ── TOP NAV ── */
.topnav {
  background: var(--white);
  border-bottom: 2px solid var(--gray-200);
  padding: 0 20px;
  display: flex;
  align-items: center;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 22px;
  color: var(--green);
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-right: 32px;
}
.logo-emoji { font-size: 26px; }
.xp-bar {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 12px;
}
.xp-label {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 13px;
  color: var(--orange);
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}
.xp-track {
  flex: 1;
  height: 16px;
  background: var(--gray-200);
  border-radius: 20px;
  overflow: hidden;
  max-width: 300px;
}
.xp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--yellow), var(--orange));
  border-radius: 20px;
  transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  width: 0%;
}
.streak-badge {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--yellow-light);
  border: 2px solid var(--yellow);
  border-radius: 20px;
  padding: 4px 10px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 13px;
  color: var(--yellow-dark);
  white-space: nowrap;
}

/* ── LAYOUT ── */
.layout {
  display: flex;
  min-height: calc(100vh - 60px);
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px;
  gap: 24px;
}

/* ── LEFT SIDEBAR ── */
.sidebar {
  width: 220px;
  flex-shrink: 0;
}
.sidebar-section {
  background: var(--white);
  border: 2px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
}
.sidebar-title {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--gray-300);
  margin-bottom: 12px;
}
.unit-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--gray-700);
  transition: all 0.15s;
  border: 2px solid transparent;
  background: none;
  width: 100%;
  text-align: left;
  margin-bottom: 4px;
}
.unit-btn:hover { background: var(--gray-100); }
.unit-btn.active {
  background: var(--green-light);
  border-color: var(--green);
  color: var(--green-dark);
}
.unit-btn.locked { opacity: 0.4; cursor: not-allowed; }
.unit-btn .unit-icon { font-size: 18px; }
.unit-btn .unit-stars {
  margin-left: auto;
  font-size: 11px;
  letter-spacing: -2px;
}

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-box {
  background: var(--gray-100);
  border-radius: var(--radius-sm);
  padding: 10px;
  text-align: center;
}
.stat-val {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 20px;
  color: var(--blue);
}
.stat-lbl { font-size: 10px; color: var(--gray-500); font-weight: 600; margin-top: 2px; }

/* ── MAIN CONTENT ── */
.main { flex: 1; min-width: 0; }

/* ── UNIT HEADER ── */
.unit-header {
  background: var(--white);
  border: 2px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.unit-emoji { font-size: 40px; }
.unit-header h2 {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 20px;
  color: var(--gray-900);
}
.unit-header p { font-size: 13px; color: var(--gray-500); margin-top: 4px; }
.unit-progress-wrap { margin-left: auto; text-align: right; }
.unit-progress-pct {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 22px;
  color: var(--green);
}
.unit-progress-lbl { font-size: 11px; color: var(--gray-300); font-weight: 600; }
.unit-progress-bar {
  width: 120px;
  height: 8px;
  background: var(--gray-200);
  border-radius: 20px;
  overflow: hidden;
  margin-top: 6px;
}
.unit-progress-fill {
  height: 100%;
  background: var(--green);
  border-radius: 20px;
  transition: width 0.4s ease;
}

/* ── LESSON CARDS ── */
.lessons-grid {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.lesson-card {
  background: var(--white);
  border: 2px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.lesson-card:hover { border-color: var(--blue); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.08); }
.lesson-card.completed { border-color: var(--green); }
.lesson-card.completed::after {
  content: '✓';
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 28px; height: 28px;
  background: var(--green);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 900;
  font-size: 14px;
  line-height: 28px;
  text-align: center;
}
.lesson-card.locked { opacity: 0.5; cursor: not-allowed; }
.lesson-card.locked:hover { transform: none; box-shadow: none; border-color: var(--gray-200); }

.lesson-icon {
  width: 48px; height: 48px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.icon-blue { background: var(--blue-light); }
.icon-green { background: var(--green-light); }
.icon-yellow { background: var(--yellow-light); }
.icon-purple { background: #f3e8ff; }
.icon-orange { background: #fff3e0; }

.lesson-info { flex: 1; }
.lesson-title {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 15px;
  color: var(--gray-900);
  margin-bottom: 3px;
}
.lesson-desc { font-size: 12px; color: var(--gray-500); }
.lesson-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
}
.lesson-tag {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.tag-beginner { background: var(--green-light); color: var(--green-dark); }
.tag-intermediate { background: var(--blue-light); color: var(--blue-dark); }
.tag-xp {
  font-size: 11px;
  font-weight: 700;
  color: var(--orange);
  display: flex;
  align-items: center;
  gap: 2px;
}
.start-btn {
  background: var(--blue);
  color: white;
  border: none;
  border-bottom: 3px solid var(--blue-dark);
  padding: 8px 18px;
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.1s;
  margin-right: 8px;
}
.start-btn:hover { transform: translateY(-1px); }
.start-btn:active { transform: translateY(1px); border-bottom-width: 1px; }
.start-btn.green { background: var(--green); border-color: var(--green-dark); }

/* ── LESSON MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  display: none;
  opacity: 0;
  transition: opacity 0.2s;
}
.modal-overlay.show { display: flex; }
.modal-overlay.visible { opacity: 1; }

.modal {
  background: var(--white);
  border-radius: 24px;
  width: 100%;
  max-width: 640px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  display: flex;
  flex-direction: column;
  transform: scale(0.9);
  transition: transform 0.2s;
}
.modal-overlay.visible .modal { transform: scale(1); }

/* Modal top bar */
.modal-topbar {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 2px solid var(--gray-200);
  gap: 12px;
  position: sticky;
  top: 0;
  background: var(--white);
  border-radius: 24px 24px 0 0;
  z-index: 1;
}
.modal-close {
  background: var(--gray-100);
  border: none;
  width: 36px; height: 36px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
  flex-shrink: 0;
}
.modal-close:hover { background: var(--gray-200); }
.modal-progress-track {
  flex: 1;
  height: 12px;
  background: var(--gray-200);
  border-radius: 20px;
  overflow: hidden;
}
.modal-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), #6ee700);
  border-radius: 20px;
  transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.modal-hearts {
  font-size: 14px;
  font-weight: 700;
  color: var(--red);
  display: flex;
  align-items: center;
  gap: 2px;
}

.modal-body { padding: 28px 32px; flex: 1; }

/* Lesson content types */
.lesson-explain {
  text-align: center;
}
.explain-emoji { font-size: 64px; margin-bottom: 16px; display: block; }
.explain-title {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 22px;
  color: var(--gray-900);
  margin-bottom: 12px;
}
.explain-subtitle { font-size: 14px; color: var(--gray-500); margin-bottom: 24px; }

.concept-box {
  background: var(--blue-light);
  border: 2px solid var(--blue);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 16px;
  text-align: left;
}
.concept-box.green { background: var(--green-light); border-color: var(--green); }
.concept-box.yellow { background: var(--yellow-light); border-color: var(--yellow); }
.concept-box.purple { background: #f3e8ff; border-color: var(--purple); }
.concept-box h4 {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 14px;
  margin-bottom: 8px;
  color: var(--gray-900);
}
.concept-box p { font-size: 13px; color: var(--gray-700); line-height: 1.6; }
.code-inline {
  font-family: 'Courier New', monospace;
  background: rgba(0,0,0,0.08);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 700;
}

/* Quiz types */
.quiz-prompt {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 18px;
  color: var(--gray-900);
  margin-bottom: 8px;
  line-height: 1.4;
}
.quiz-subtext { font-size: 13px; color: var(--gray-500); margin-bottom: 24px; }

.options-grid { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  background: var(--white);
  border: 2px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 14px 18px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: var(--gray-700);
  text-align: left;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: 'Noto Sans KR', sans-serif;
}
.option-btn:hover { border-color: var(--blue); background: var(--blue-light); color: var(--blue-dark); }
.option-btn.selected { border-color: var(--blue); background: var(--blue-light); }
.option-btn.correct { border-color: var(--green) !important; background: var(--green-light) !important; color: var(--green-dark) !important; pointer-events: none; }
.option-btn.wrong { border-color: var(--red) !important; background: var(--red-light) !important; color: var(--red) !important; pointer-events: none; }
.option-btn.reveal { border-color: var(--green); background: var(--green-light); color: var(--green-dark); pointer-events: none; }
.option-btn.dimmed { opacity: 0.4; pointer-events: none; }

.option-letter {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: var(--gray-200);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 13px;
  flex-shrink: 0;
  transition: all 0.15s;
}
.option-btn:hover .option-letter { background: var(--blue); color: white; }
.option-btn.correct .option-letter { background: var(--green); color: white; }
.option-btn.wrong .option-letter { background: var(--red); color: white; }
.option-btn.reveal .option-letter { background: var(--green); color: white; }

/* Tap to match */
.match-section { margin-bottom: 20px; }
.match-title { font-size: 12px; font-weight: 700; color: var(--gray-300); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.chips-row { display: flex; flex-wrap: wrap; gap: 8px; }
.match-chip {
  padding: 10px 16px;
  border-radius: 10px;
  border: 2px solid var(--gray-200);
  background: var(--white);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--gray-700);
  transition: all 0.15s;
  font-family: 'Courier New', monospace;
}
.match-chip:hover { border-color: var(--purple); background: #f3e8ff; color: var(--purple-dark); }
.match-chip.selected { border-color: var(--purple); background: #f3e8ff; color: var(--purple-dark); }
.match-chip.matched { border-color: var(--green); background: var(--green-light); color: var(--green-dark); pointer-events: none; }
.match-chip.wrong-match { border-color: var(--red); background: var(--red-light); color: var(--red); animation: shake 0.3s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

/* Fill blank */
.sentence-wrap {
  background: var(--gray-100);
  border-radius: var(--radius);
  padding: 20px;
  font-family: 'Courier New', monospace;
  font-size: 15px;
  line-height: 2;
  margin-bottom: 20px;
  text-align: center;
}
.blank-slot {
  display: inline-block;
  min-width: 120px;
  padding: 4px 12px;
  border-bottom: 3px solid var(--gray-300);
  cursor: pointer;
  font-family: 'Courier New', monospace;
  font-weight: 700;
  color: var(--blue-dark);
  background: var(--blue-light);
  border-radius: 6px;
  vertical-align: middle;
  transition: all 0.15s;
}
.blank-slot.filled { border-color: var(--blue); }
.blank-slot.correct { background: var(--green-light); border-color: var(--green); color: var(--green-dark); }
.blank-slot.wrong { background: var(--red-light); border-color: var(--red); color: var(--red); }

.word-bank { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.word-tile {
  padding: 8px 16px;
  border: 2px solid var(--gray-200);
  border-bottom: 4px solid var(--gray-200);
  border-radius: 10px;
  background: var(--white);
  cursor: pointer;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  font-weight: 700;
  transition: all 0.1s;
}
.word-tile:hover { border-color: var(--blue); background: var(--blue-light); }
.word-tile.used { opacity: 0.3; pointer-events: none; }
.word-tile:active { transform: translateY(2px); border-bottom-width: 2px; }

/* Feedback banner */
.feedback-banner {
  position: sticky;
  bottom: 0;
  margin: 0 -32px -28px;
  padding: 20px 32px;
  border-radius: 0 0 24px 24px;
  display: none;
  animation: slideUp 0.2s ease;
}
@keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.feedback-banner.show { display: block; }
.feedback-banner.correct-fb { background: var(--green-light); border-top: 2px solid var(--green); }
.feedback-banner.wrong-fb { background: var(--red-light); border-top: 2px solid var(--red); }
.fb-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.fb-icon { font-size: 22px; }
.fb-title {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 16px;
}
.feedback-banner.correct-fb .fb-title { color: var(--green-dark); }
.feedback-banner.wrong-fb .fb-title { color: var(--red); }
.fb-text { font-size: 13px; color: var(--gray-700); line-height: 1.5; margin-bottom: 16px; }
.fb-continue {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.1s;
}
.feedback-banner.correct-fb .fb-continue { background: var(--green); color: white; border-bottom: 3px solid var(--green-dark); }
.feedback-banner.wrong-fb .fb-continue { background: var(--red); color: white; border-bottom: 3px solid #cc3b3b; }
.fb-continue:active { transform: translateY(2px); border-bottom-width: 1px; }

/* Completion screen */
.completion-screen {
  text-align: center;
  padding: 20px 0;
}
.completion-trophy { font-size: 80px; display: block; margin-bottom: 12px; animation: bounce 0.6s ease; }
@keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
.completion-title {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 28px;
  color: var(--gray-900);
  margin-bottom: 8px;
}
.completion-sub { font-size: 14px; color: var(--gray-500); margin-bottom: 28px; }
.xp-earned {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--yellow-light);
  border: 2px solid var(--yellow);
  border-radius: var(--radius);
  padding: 12px 24px;
  margin-bottom: 24px;
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 20px;
  color: var(--yellow-dark);
}
.completion-btn {
  background: var(--green);
  color: white;
  border: none;
  border-bottom: 4px solid var(--green-dark);
  padding: 16px 48px;
  border-radius: var(--radius);
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.1s;
}
.completion-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(88,204,2,0.3); }

/* AI Quiz section */
.ai-section {
  background: linear-gradient(135deg, #667eea0d, #764ba20d);
  border: 2px solid var(--purple);
  border-radius: var(--radius);
  padding: 20px;
  margin-top: 16px;
}
.ai-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--purple);
  color: white;
  padding: 4px 12px;
  border-radius: 20px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 11px;
  letter-spacing: 0.06em;
  margin-bottom: 10px;
}
.ai-section h3 {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 16px;
  margin-bottom: 6px;
}
.ai-section p { font-size: 13px; color: var(--gray-500); margin-bottom: 16px; }
.topic-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.topic-chip {
  padding: 6px 12px;
  border: 2px solid var(--gray-200);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--gray-700);
  background: var(--white);
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let xp = 0, completed = 0, totalAnswers = 0, correctAnswers = 0;
let currentUnit = 0;
let unitCompletion = [[], [], [], []]; // completed lesson ids per unit

let modalLesson = null, modalStep = 0, modalHearts = 3;
let fillState = {}, matchState = {};

// ─────────────────────────────────────────────
// RENDER LESSONS
// ─────────────────────────────────────────────
function selectUnit(id, btn) {
  currentUnit = id;
  document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderUnit();
}

function renderUnit() {
  const u = units[currentUnit];
  document.getElementById('unitEmoji').textContent = u.emoji;
  document.getElementById('unitTitle').textContent = u.title;
  document.getElementById('unitDesc').textContent = u.desc;
  const done = unitCompletion[currentUnit].length;
  const total = u.lessons.length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('unitPct').textContent = pct + '%';
  document.getElementById('unitFill').style.width = pct + '%';

  const grid = document.getElementById('lessonsGrid');
  grid.innerHTML = u.lessons.map((l, i) => {
    const isDone = unitCompletion[currentUnit].includes(l.id);
    const cls = isDone ? 'completed' : '';
    return `
      <div class="lesson-card ${cls}" onclick="openLesson(${currentUnit}, ${i})">
        <div class="lesson-icon ${l.iconClass}">${l.icon}</div>
        <div class="lesson-info">
          <div class="lesson-title">${l.title}</div>
          <div class="lesson-desc">${l.steps.length}단계 학습</div>
          <div class="lesson-meta">
            <span class="lesson-tag tag-${l.tag}">${l.tag === 'beginner' ? '기초' : '응용'}</span>
            <span class="lesson-tag tag-xp">⚡ ${l.xp} XP</span>
          </div>
        </div>
        <button class="start-btn ${isDone ? 'green' : ''}" onclick="event.stopPropagation();openLesson(${currentUnit},${i})">
          ${isDone ? '복습' : '시작'}
        </button>
      </div>
    `;
  }).join('');
}

// ─────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────
function openLesson(unitIdx, lessonIdx) {
  const lesson = units[unitIdx].lessons[lessonIdx];
  modalLesson = { unitIdx, lessonIdx, lesson };
  modalStep = 0;
  modalHearts = 3;
  fillState = {};
  matchState = {};
  updateHearts();
  showModal();
  renderStep();
}

function showModal() {
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.add('show');
  setTimeout(() => overlay.classList.add('visible'), 10);
}
function closeModal() {
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.remove('visible');
  setTimeout(() => overlay.classList.remove('show'), 200);
}
function checkOverlayClose(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function updateProgress() {
  const total = modalLesson.lesson.steps.length;
  const pct = Math.round((modalStep / total) * 100);
  document.getElementById('modalProgress').style.width = pct + '%';
}
function updateHearts() {
  const h = document.getElementById('modalHearts');
  h.innerHTML = '❤️'.repeat(modalHearts) + '🖤'.repeat(3 - modalHearts);
}

function renderStep() {
  updateProgress();
  const step = modalLesson.lesson.steps[modalStep];
  const body = document.getElementById('modalBody');
  if (step.type === 'explain') body.innerHTML = renderExplain(step);
  else if (step.type === 'mcq') body.innerHTML = renderMCQ(step);
  else if (step.type === 'fillblank') body.innerHTML = renderFill(step);
  body.querySelectorAll('.option-btn').forEach(b => b.classList.add('bounce-in'));
}

function renderExplain(step) {
  const boxes = step.boxes.map(b => `
    <div class="concept-box ${b.color}">
      <h4>${b.title}</h4>
      <p>${b.text.replace(/\n/g, '<br>').replace(/`([^`]+)`/g, '<span class="code-inline">$1</span>')}</p>
    </div>
  `).join('');
  return `
    <div class="lesson-explain">
      <span class="explain-emoji">${step.emoji}</span>
      <div class="explain-title">${step.title}</div>
      <div class="explain-subtitle">${step.subtitle}</div>
      ${boxes}
      <button class="start-btn green" style="width:100%;padding:14px;margin-top:16px;font-size:15px;border-radius:12px;" onclick="nextStep()">
        이해했어요! →
      </button>
    </div>
  `;
}

function renderMCQ(step) {
  const letters = ['A','B','C','D'];
  const opts = step.options.map((o, i) => `
    <button class="option-btn" onclick="selectMCQ(this, ${i}, ${step.answer}, \`${step.feedback.replace(/`/g,'\\`')}\`)">
      <div class="option-letter">${letters[i]}</div>
      <span>${o}</span>
    </button>
  `).join('');
  return `
    <div class="quiz-prompt">${step.prompt}</div>
    <div class="quiz-subtext">${step.sub}</div>
    <div class="options-grid">${opts}</div>
    <div class="feedback-banner" id="feedbackBanner">
      <div class="fb-top"><span class="fb-icon"></span><span class="fb-title"></span></div>
      <div class="fb-text"></div>
      <button class="fb-continue" onclick="nextStep()">계속하기</button>
    </div>
  `;
}

function selectMCQ(btn, idx, answer, feedback) {
  const allBtns = document.querySelectorAll('.option-btn');
  const isCorrect = idx === answer;
  allBtns.forEach((b, i) => {
    if (i === answer) b.classList.add('reveal');
    else if (i === idx && !isCorrect) b.classList.add('wrong');
    else b.classList.add('dimmed');
  });
  totalAnswers++;
  if (isCorrect) {
    correctAnswers++;
    showFeedback(true, '잘했어요! 🎉', feedback);
  } else {
    modalHearts = Math.max(0, modalHearts - 1);
    updateHearts();
    showFeedback(false, '아쉽지만 괜찮아요!', feedback);
  }
  updateStats();
}

function renderFill(step) {
  // single blank implementation
  fillState = { filled: null, wordbank: [...step.wordbank] };
  const sentenceHTML = step.sentence.replace('___', `<span class="blank-slot" id="blankSlot" onclick="clearBlank()">${''}</span>`);
  const bankHTML = step.wordbank.map((w, i) => `
    <div class="word-tile" id="tile${i}" onclick="fillBlank(${i}, '${w}')">${w}</div>
  `).join('');
  return `
    <div class="quiz-prompt">${step.prompt}</div>
    <div class="quiz-subtext">${step.sub}</div>
    <div class="sentence-wrap" style="font-size:14px;">${sentenceHTML}</div>
    <div class="word-bank">${bankHTML}</div>
    <button class="start-btn" id="checkFillBtn" style="margin-top:20px;width:100%;padding:14px;border-radius:12px;font-size:15px;display:none;" onclick="checkFill('${step.blanks[0]}', \`${step.feedback.replace(/`/g,'\\`')}\`)">
      확인하기 ✓
    </button>
    <div class="feedback-banner" id="feedbackBanner">
      <div class="fb-top"><span class="fb-icon"></span><span class="fb-title"></span></div>
      <div class="fb-text"></div>
      <button class="fb-continue" onclick="nextStep()">계속하기</button>
    </div>
  `;
}

function fillBlank(idx, word) {
  if (fillState.filled !== null) {
    document.getElementById('tile' + fillState.filledIdx).classList.remove('used');
  }
  fillState.filled = word;
  fillState.filledIdx = idx;
  document.getElementById('tile' + idx).classList.add('used');
  const slot = document.getElementById('blankSlot');
  slot.textContent = word;
  slot.classList.add('filled');
  document.getElementById('checkFillBtn').style.display = 'block';
}

function clearBlank() {
  if (fillState.filledIdx !== undefined) {
    document.getElementById('tile' + fillState.filledIdx).classList.remove('used');
  }
  fillState.filled = null;
  const slot = document.getElementById('blankSlot');
  slot.textContent = '';
  slot.classList.remove('filled');
  document.getElementById('checkFillBtn').style.display = 'none';
}

function checkFill(answer, feedback) {
  const slot = document.getElementById('blankSlot');
  document.querySelectorAll('.word-tile').forEach(t => t.style.pointerEvents = 'none');
  document.getElementById('checkFillBtn').style.display = 'none';
  totalAnswers++;
  if (fillState.filled === answer) {
    correctAnswers++;
    slot.classList.add('correct');
    showFeedback(true, '완벽해요! 🎉', feedback);
  } else {
    slot.classList.add('wrong');
    modalHearts = Math.max(0, modalHearts - 1);
    updateHearts();
    showFeedback(false, '다시 한번 확인해봐요!', `정답은 "${answer}"이에요. ${feedback}`);
  }
  updateStats();
}

function showFeedback(correct, title, text) {
  const banner = document.getElementById('feedbackBanner');
  banner.className = 'feedback-banner show ' + (correct ? 'correct-fb' : 'wrong-fb');
  banner.querySelector('.fb-icon').textContent = correct ? '✅' : '❌';
  banner.querySelector('.fb-title').textContent = title;
  banner.querySelector('.fb-text').textContent = text;
}

function nextStep() {
  const lesson = modalLesson.lesson;
  modalStep++;
  if (modalStep >= lesson.steps.length) {
    showCompletion();
    return;
  }
  document.getElementById('modalBody').innerHTML = '';
  setTimeout(() => renderStep(), 50);
}

function showCompletion() {
  const lesson = modalLesson.lesson;
  const isDone = unitCompletion[modalLesson.unitIdx].includes(lesson.id);
  if (!isDone) {
    unitCompletion[modalLesson.unitIdx].push(lesson.id);
    addXP(lesson.xp);
    completed++;
  }
  document.getElementById('modalProgress').style.width = '100%';
  document.getElementById('modalBody').innerHTML = `
    <div class="completion-screen">
      <span class="completion-trophy">🏆</span>
      <div class="completion-title">레슨 완료!</div>
      <div class="completion-sub">"${lesson.title}" 학습을 마쳤어요</div>
      <div><div class="xp-earned">⚡ +${isDone ? 0 : lesson.xp} XP 획득!</div></div>
      <br>
      <button class="completion-btn" onclick="closeModal(); renderUnit();">
        계속 배우기 →
      </button>
    </div>
  `;
  renderUnit();
  updateStars();
}

function addXP(amount) {
  xp += amount;
  document.getElementById('xpVal').textContent = xp;
  document.getElementById('statXP').textContent = xp;
  const fillPct = Math.min((xp % 100) / 100 * 100, 100);
  document.getElementById('xpFill').style.width = fillPct + '%';
}

function updateStats() {
  document.getElementById('statDone').textContent = completed;
  const acc = totalAnswers > 0 ? Math.round(correctAnswers / totalAnswers * 100) + '%' : '—';
  document.getElementById('statAcc').textContent = acc;
}

function updateStars() {
  units.forEach((u, i) => {
    const done = unitCompletion[i].length;
    const total = u.lessons.length;
    const el = document.getElementById('stars' + i);
    if (!el) return;
    if (done === 0) el.textContent = '☆☆☆';
    else if (done < total) el.textContent = '⭐☆☆';
    else el.textContent = '⭐⭐⭐';
  });
}

// ─────────────────────────────────────────────
// AI QUIZ
// ─────────────────────────────────────────────
document.querySelectorAll('.topic-chip').forEach(c => {
  c.addEventListener('click', () => c.classList.toggle('sel'));
});

async function runAIQuiz() {
  const topics = [...document.querySelectorAll('.topic-chip.sel')].map(c => c.dataset.t);
  if (!topics.length) { alert('주제를 하나 이상 선택해주세요!'); return; }
  const btn = document.getElementById('aiBtn');
  const resultDiv = document.getElementById('aiResult');
  const thinking = document.getElementById('aiThinking');
  const box = document.getElementById('aiBox');
  btn.disabled = true;
  resultDiv.classList.add('show');
  thinking.style.display = 'flex';
  box.style.display = 'none';
  box.innerHTML = '';

  const sys = `당신은 코다(Coda) 툴 교육 전문가입니다.
아래 JSON만 반환하세요. 마크다운, 설명, 코드블록 없이 순수 JSON:
{"question":"문제","options":["A","B","C","D"],"answer":0,"explanation":"해설"}`;

  const usr = `코다 입문자를 위한 쉬운 퀴즈 하나를 만들어주세요.
주제: ${topics.join(', ')}
- 쉬운 난이도 (개념 이해 수준)
- 실무 상황 기반
- 한국어
- 보기는 4개`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        system: sys,
        messages: [{ role: 'user', content: usr }]
      })
    });
    const data = await res.json();
    const raw = data.content.map(c => c.text || '').join('').replace(/```json|```/g, '').trim();
    const q = JSON.parse(raw);
    thinking.style.display = 'none';
    box.style.display = 'block';
    renderAIQ(q);
  } catch(e) {
    thinking.style.display = 'none';
    box.style.display = 'block';
    box.innerHTML = `<div style="color:var(--red);font-size:13px;padding:12px;">⚠️ 문제 생성에 실패했어요. 다시 시도해주세요!<br><small>${e.message}</small></div>`;
  } finally {
    btn.disabled = false;
  }
}

function renderAIQ(q) {
  const box = document.getElementById('aiBox');
  const letters = ['A','B','C','D'];
  box.innerHTML = `
    <div class="ai-q">${q.question}</div>
    <div class="ai-opts">
      ${q.options.map((o, i) => `
        <div class="ai-opt" onclick="pickAI(this,${i},${q.answer},\`${(q.explanation||'').replace(/`/g,'\\`')}\`)">
          <div class="ai-letter">${letters[i]}</div>
          <span>${o}</span>
        </div>
      `).join('')}
    </div>
    <div class="ai-fb" id="aiFb"></div>
    <button class="ai-retry-btn" id="aiRetry" onclick="runAIQuiz()">🔄 새 문제 생성</button>
  `;
}

function pickAI(el, idx, answer, explanation) {
  const all = document.querySelectorAll('.ai-opt');
  all.forEach((o, i) => {
    o.classList.add('d');
    if (i === answer) o.classList.add('c');
    else if (i === idx && idx !== answer) o.classList.add('w');
  });
  const fb = document.getElementById('aiFb');
  const isCorrect = idx === answer;
  totalAnswers++;
  if (isCorrect) { correctAnswers++; addXP(5); }
  fb.className = 'ai-fb show ' + (isCorrect ? 'c' : 'w');
  fb.textContent = (isCorrect ? '✅ 정답! ' : '❌ 오답. ') + explanation;
  document.getElementById('aiRetry').classList.add('show');
  updateStats();
}
