<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코다 배우기 🦉</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --green:#58cc02;--green-dark:#46a302;--green-light:#d7ffb8;
  --blue:#1cb0f6;--blue-dark:#0f8bc4;--blue-light:#ddf4ff;
  --yellow:#ffc800;--yellow-dark:#e6b000;--yellow-light:#fff9c4;
  --red:#ff4b4b;--red-light:#ffdfe0;
  --orange:#ff9600;--purple:#ce82ff;--purple-dark:#a560e8;
  --bg:#f8f9fa;--white:#ffffff;
  --gray-100:#f7f7f7;--gray-200:#e5e5e5;--gray-300:#afafaf;
  --gray-500:#777777;--gray-700:#4b4b4b;--gray-900:#1f1f1f;
  --radius:16px;--radius-sm:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--gray-900);min-height:100vh;}

/* NAV */
.topnav{background:var(--white);border-bottom:2px solid var(--gray-200);padding:0 20px;display:flex;align-items:center;height:60px;position:sticky;top:0;z-index:100;}
.logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:22px;color:var(--green);display:flex;align-items:center;gap:8px;margin-right:32px;}
.xp-bar{flex:1;display:flex;align-items:center;gap:12px;}
.xp-label{font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;color:var(--orange);display:flex;align-items:center;gap:4px;white-space:nowrap;}
.xp-track{flex:1;height:16px;background:var(--gray-200);border-radius:20px;overflow:hidden;max-width:300px;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--yellow),var(--orange));border-radius:20px;transition:width .5s cubic-bezier(.34,1.56,.64,1);width:0%;}
.streak-badge{display:flex;align-items:center;gap:4px;background:var(--yellow-light);border:2px solid var(--yellow);border-radius:20px;padding:4px 10px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;color:var(--yellow-dark);white-space:nowrap;}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 60px);max-width:1100px;margin:0 auto;padding:20px;gap:24px;}
.sidebar{width:220px;flex-shrink:0;}
.sidebar-section{background:var(--white);border:2px solid var(--gray-200);border-radius:var(--radius);padding:16px;margin-bottom:16px;}
.sidebar-title{font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-300);margin-bottom:12px;}
.unit-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:600;color:var(--gray-700);transition:all .15s;border:2px solid transparent;background:none;width:100%;text-align:left;margin-bottom:4px;}
.unit-btn:hover{background:var(--gray-100);}
.unit-btn.active{background:var(--green-light);border-color:var(--green);color:var(--green-dark);}
.unit-btn .unit-icon{font-size:18px;}
.unit-btn .unit-stars{margin-left:auto;font-size:11px;letter-spacing:-2px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-box{background:var(--gray-100);border-radius:var(--radius-sm);padding:10px;text-align:center;}
.stat-val{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;color:var(--blue);}
.stat-lbl{font-size:10px;color:var(--gray-500);font-weight:600;margin-top:2px;}

/* MAIN */
.main{flex:1;min-width:0;}
.unit-header{background:var(--white);border:2px solid var(--gray-200);border-radius:var(--radius);padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:16px;}
.unit-emoji{font-size:40px;}
.unit-header h2{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;}
.unit-header p{font-size:13px;color:var(--gray-500);margin-top:4px;}
.unit-progress-wrap{margin-left:auto;text-align:right;}
.unit-progress-pct{font-family:'Nunito',sans-serif;font-weight:900;font-size:22px;color:var(--green);}
.unit-progress-lbl{font-size:11px;color:var(--gray-300);font-weight:600;}
.unit-progress-bar{width:120px;height:8px;background:var(--gray-200);border-radius:20px;overflow:hidden;margin-top:6px;}
.unit-progress-fill{height:100%;background:var(--green);border-radius:20px;transition:width .4s ease;}

/* LESSON CARDS */
.lessons-grid{display:flex;flex-direction:column;gap:12px;}
.lesson-card{background:var(--white);border:2px solid var(--gray-200);border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
.lesson-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.08);}
.lesson-card.completed{border-color:var(--green);}
.lesson-card.completed::after{content:'✓';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:28px;height:28px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:14px;line-height:28px;text-align:center;}
.lesson-icon{width:48px;height:48px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.icon-blue{background:var(--blue-light);}
.icon-green{background:var(--green-light);}
.icon-yellow{background:var(--yellow-light);}
.icon-purple{background:#f3e8ff;}
.icon-orange{background:#fff3e0;}
.lesson-info{flex:1;}
.lesson-title{font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;margin-bottom:3px;}
.lesson-desc{font-size:12px;color:var(--gray-500);}
.lesson-meta{display:flex;align-items:center;gap:6px;margin-top:6px;}
.lesson-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;}
.tag-beginner{background:var(--green-light);color:var(--green-dark);}
.tag-intermediate{background:var(--blue-light);color:var(--blue-dark);}
.tag-xp{font-size:11px;font-weight:700;color:var(--orange);}
.start-btn{background:var(--blue);color:white;border:none;border-bottom:3px solid var(--blue-dark);padding:8px 18px;border-radius:10px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;transition:all .1s;margin-right:8px;white-space:nowrap;}
.start-btn:hover{transform:translateY(-1px);}
.start-btn:active{transform:translateY(1px);border-bottom-width:1px;}
.start-btn.green{background:var(--green);border-color:var(--green-dark);}

/* PRACTICE SECTION */
.practice-section{background:linear-gradient(135deg,#e8f5e9,#e3f2fd);border:2px solid var(--green);border-radius:var(--radius);padding:20px;margin-top:20px;}
.practice-label{display:inline-flex;align-items:center;gap:6px;background:var(--green);color:white;padding:4px 12px;border-radius:20px;font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;letter-spacing:.06em;margin-bottom:12px;}
.practice-section h3{font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;margin-bottom:6px;}
.practice-section p{font-size:13px;color:var(--gray-700);margin-bottom:16px;line-height:1.6;}
.practice-code{background:var(--gray-900);color:#a8ff78;border-radius:var(--radius-sm);padding:14px 16px;font-family:'Courier New',monospace;font-size:13px;line-height:1.7;margin-bottom:12px;position:relative;overflow:auto;}
.practice-code .comment{color:#888;}
.practice-code .fn{color:#79c0ff;}
.practice-code .str{color:#f8a8a8;}
.practice-steps{display:flex;flex-direction:column;gap:10px;}
.practice-step{background:var(--white);border:2px solid var(--gray-200);border-radius:var(--radius-sm);padding:14px 16px;display:flex;gap:12px;align-items:flex-start;}
.step-num{width:28px;height:28px;background:var(--blue);border-radius:50%;color:white;font-family:'Nunito',sans-serif;font-weight:900;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-content{font-size:13px;line-height:1.6;color:var(--gray-700);}
.step-content strong{color:var(--gray-900);}
.step-content code{font-family:'Courier New',monospace;background:var(--gray-100);padding:1px 5px;border-radius:4px;font-size:12px;color:var(--blue-dark);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity .2s;}
.modal-overlay.show{display:flex;}
.modal-overlay.visible{opacity:1;}
.modal{background:var(--white);border-radius:24px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);display:flex;flex-direction:column;transform:scale(.9);transition:transform .2s;}
.modal-overlay.visible .modal{transform:scale(1);}
.modal-topbar{display:flex;align-items:center;padding:16px 20px;border-bottom:2px solid var(--gray-200);gap:12px;position:sticky;top:0;background:var(--white);border-radius:24px 24px 0 0;z-index:1;}
.modal-close{background:var(--gray-100);border:none;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;}
.modal-close:hover{background:var(--gray-200);}
.modal-progress-track{flex:1;height:12px;background:var(--gray-200);border-radius:20px;overflow:hidden;}
.modal-progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#6ee700);border-radius:20px;transition:width .4s cubic-bezier(.34,1.56,.64,1);}
.modal-hearts{font-size:14px;font-weight:700;color:var(--red);display:flex;align-items:center;gap:2px;}
.modal-body{padding:28px 32px;flex:1;}

/* EXPLAIN */
.lesson-explain{text-align:center;}
.explain-emoji{font-size:64px;margin-bottom:16px;display:block;}
.explain-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:22px;color:var(--gray-900);margin-bottom:8px;}
.explain-subtitle{font-size:14px;color:var(--gray-500);margin-bottom:20px;}
.concept-box{border-radius:var(--radius);padding:16px 20px;margin-bottom:12px;text-align:left;}
.concept-box.blue{background:var(--blue-light);border:2px solid var(--blue);}
.concept-box.green{background:var(--green-light);border:2px solid var(--green);}
.concept-box.yellow{background:var(--yellow-light);border:2px solid var(--yellow);}
.concept-box.purple{background:#f3e8ff;border:2px solid var(--purple);}
.concept-box h4{font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;margin-bottom:6px;}
.concept-box p{font-size:13px;color:var(--gray-700);line-height:1.7;}
.concept-box p code{font-family:'Courier New',monospace;background:rgba(0,0,0,.08);padding:1px 5px;border-radius:4px;font-size:12px;font-weight:700;}

/* QUIZ */
.quiz-prompt{font-family:'Nunito',sans-serif;font-weight:800;font-size:18px;color:var(--gray-900);margin-bottom:6px;line-height:1.4;}
.quiz-subtext{font-size:13px;color:var(--gray-500);margin-bottom:20px;}
.quiz-code-block{background:var(--gray-900);color:#a8ff78;border-radius:var(--radius-sm);padding:12px 16px;font-family:'Courier New',monospace;font-size:13px;margin-bottom:20px;line-height:1.6;}
.options-grid{display:flex;flex-direction:column;gap:10px;}
.option-btn{background:var(--white);border:2px solid var(--gray-200);border-radius:var(--radius);padding:14px 18px;cursor:pointer;font-size:14px;font-weight:600;color:var(--gray-700);text-align:left;transition:all .15s;display:flex;align-items:center;gap:12px;font-family:'Noto Sans KR',sans-serif;width:100%;}
.option-btn:hover{border-color:var(--blue);background:var(--blue-light);color:var(--blue-dark);}
.option-btn.correct{border-color:var(--green)!important;background:var(--green-light)!important;color:var(--green-dark)!important;pointer-events:none;}
.option-btn.wrong{border-color:var(--red)!important;background:var(--red-light)!important;color:var(--red)!important;pointer-events:none;}
.option-btn.reveal{border-color:var(--green);background:var(--green-light);color:var(--green-dark);pointer-events:none;}
.option-btn.dimmed{opacity:.4;pointer-events:none;}
.option-letter{width:28px;height:28px;border-radius:8px;background:var(--gray-200);display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-weight:900;font-size:13px;flex-shrink:0;transition:all .15s;}
.option-btn:hover .option-letter{background:var(--blue);color:white;}
.option-btn.correct .option-letter{background:var(--green);color:white;}
.option-btn.wrong .option-letter{background:var(--red);color:white;}
.option-btn.reveal .option-letter{background:var(--green);color:white;}

/* FILL BLANK */
.sentence-wrap{background:var(--gray-100);border-radius:var(--radius);padding:20px;font-family:'Courier New',monospace;font-size:14px;line-height:2;margin-bottom:20px;text-align:center;}
.blank-slot{display:inline-block;min-width:100px;padding:4px 10px;border-bottom:3px solid var(--gray-300);cursor:pointer;font-family:'Courier New',monospace;font-weight:700;background:var(--blue-light);border-radius:6px;vertical-align:middle;transition:all .15s;color:var(--blue-dark);}
.blank-slot.filled{border-color:var(--blue);}
.blank-slot.correct{background:var(--green-light);border-color:var(--green);color:var(--green-dark);}
.blank-slot.wrong{background:var(--red-light);border-color:var(--red);color:var(--red);}
.word-bank{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.word-tile{padding:8px 16px;border:2px solid var(--gray-200);border-bottom:4px solid var(--gray-200);border-radius:10px;background:var(--white);cursor:pointer;font-family:'Courier New',monospace;font-size:13px;font-weight:700;transition:all .1s;}
.word-tile:hover{border-color:var(--blue);background:var(--blue-light);}
.word-tile.used{opacity:.3;pointer-events:none;}
.word-tile:active{transform:translateY(2px);border-bottom-width:2px;}
.check-btn{margin-top:20px;width:100%;padding:14px;border:none;border-bottom:3px solid var(--blue-dark);background:var(--blue);color:white;border-radius:var(--radius-sm);font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;cursor:pointer;display:none;}
.check-btn:active{transform:translateY(2px);border-bottom-width:1px;}

/* FEEDBACK */
.feedback-banner{position:sticky;bottom:0;margin:0 -32px -28px;padding:20px 32px;border-radius:0 0 24px 24px;display:none;animation:slideUp .2s ease;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.feedback-banner.show{display:block;}
.feedback-banner.correct-fb{background:var(--green-light);border-top:2px solid var(--green);}
.feedback-banner.wrong-fb{background:var(--red-light);border-top:2px solid var(--red);}
.fb-top{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.fb-icon{font-size:22px;}
.fb-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;}
.feedback-banner.correct-fb .fb-title{color:var(--green-dark);}
.feedback-banner.wrong-fb .fb-title{color:var(--red);}
.fb-text{font-size:13px;color:var(--gray-700);line-height:1.5;margin-bottom:16px;}
.fb-continue{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;cursor:pointer;transition:all .1s;}
.feedback-banner.correct-fb .fb-continue{background:var(--green);color:white;border-bottom:3px solid var(--green-dark);}
.feedback-banner.wrong-fb .fb-continue{background:var(--red);color:white;border-bottom:3px solid #cc3b3b;}
.fb-continue:active{transform:translateY(2px);}

/* COMPLETION */
.completion-screen{text-align:center;padding:20px 0;}
.completion-trophy{font-size:80px;display:block;margin-bottom:12px;animation:bounce .6s ease;}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.completion-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:28px;color:var(--gray-900);margin-bottom:8px;}
.completion-sub{font-size:14px;color:var(--gray-500);margin-bottom:24px;}
.xp-earned{display:inline-flex;align-items:center;gap:8px;background:var(--yellow-light);border:2px solid var(--yellow);border-radius:var(--radius);padding:12px 24px;margin-bottom:24px;font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;color:var(--yellow-dark);}
.completion-btn{background:var(--green);color:white;border:none;border-bottom:4px solid var(--green-dark);padding:16px 48px;border-radius:var(--radius);font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;cursor:pointer;transition:all .1s;}
.completion-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(88,204,2,.3);}

@media(max-width:700px){
  .layout{flex-direction:column;padding:12px;}
  .sidebar{width:100%;}
  .modal-body{padding:20px;}
  .feedback-banner{margin:0 -20px -20px;padding:16px 20px;}
}
.bounce-in{animation:bounceIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes bounceIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>
<body>

<nav class="topnav">
  <div class="logo">🦉 코다런</div>
  <div class="xp-bar">
    <div class="xp-label">⚡ <span id="xpVal">0</span> XP</div>
    <div class="xp-track"><div class="xp-fill" id="xpFill"></div></div>
  </div>
  <div class="streak-badge">🔥 <span id="streakVal">1</span>일 연속</div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">학습 단원</div>
      <button class="unit-btn active" onclick="selectUnit(0,this)"><span class="unit-icon">🔍</span><span>Filter 함수</span><span class="unit-stars" id="stars0">☆</span></button>
      <button class="unit-btn" onclick="selectUnit(1,this)"><span class="unit-icon">🔀</span><span>If 함수</span><span class="unit-stars" id="stars1">☆</span></button>
      <button class="unit-btn" onclick="selectUnit(2,this)"><span class="unit-icon">🔘</span><span>Button 자동화</span><span class="unit-stars" id="stars2">☆</span></button>
      <button class="unit-btn" onclick="selectUnit(3,this)"><span class="unit-icon">🔗</span><span>Cross-doc</span><span class="unit-stars" id="stars3">☆</span></button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">내 통계</div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-val" id="statXP">0</div><div class="stat-lbl">⚡ XP</div></div>
        <div class="stat-box"><div class="stat-val" id="statDone">0</div><div class="stat-lbl">✅ 완료</div></div>
        <div class="stat-box"><div class="stat-val" id="statStreak">1</div><div class="stat-lbl">🔥 연속</div></div>
        <div class="stat-box"><div class="stat-val" id="statAcc">—</div><div class="stat-lbl">🎯 정확도</div></div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="unit-header" id="unitHeader">
      <div class="unit-emoji" id="unitEmoji">🔍</div>
      <div>
        <h2 id="unitTitle">Filter 함수</h2>
        <p id="unitDesc">원하는 데이터만 골라내는 코다의 핵심 기능</p>
      </div>
      <div class="unit-progress-wrap">
        <div class="unit-progress-pct" id="unitPct">0%</div>
        <div class="unit-progress-lbl">진도율</div>
        <div class="unit-progress-bar"><div class="unit-progress-fill" id="unitFill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="lessons-grid" id="lessonsGrid"></div>
    <div id="practiceArea"></div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="checkOverlayClose(event)">
  <div class="modal" id="modal">
    <div class="modal-topbar">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-progress-track"><div class="modal-progress-fill" id="modalProgress" style="width:0%"></div></div>
      <div class="modal-hearts" id="modalHearts">❤️❤️❤️</div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// UNITS DATA
// ═══════════════════════════════════════════════
// IMPORTANT: steps are stored as plain objects with no quotes in onclick.
// selectMCQ / checkFill receive step index, look up data from currentSteps[].

const units = [
  // ───── 0: FILTER ─────
  {
    id:0, emoji:'🔍', title:'Filter 함수', desc:'원하는 데이터만 골라내는 코다의 핵심 기능',
    practice: {

            options:['코다 시스템에서 요구하는 필수 규칙이다', '원본 테이블과 구분하기 위한 관례적 표기다', 'Cross-doc 기능을 활성화하는 코드다', '읽기 전용임을 시스템에 알리는 표시다'],
            answer:1, feedback:'정답! "_CD"는 Cross-Doc의 약자로, 팀에서 관례적으로 사용하는 구분 표기예요. 필수는 아니지만 원본과 헷갈리지 않으려면 꼭 사용하세요 📌'
          },
        ]
      },
      {
        id:'cd2', title:'Cross-doc + Filter 실전 활용', tag:'intermediate', icon:'⚡', iconClass:'icon-yellow', xp:20,

            boxes:[
              { color:'blue', title:'📌 실전 예시', text:'마스터 DB에서 가져온 학생명단_CD에서\n우리 팀 학생만 필터:\n<code>학생명단_CD.Filter(Department = "마케팅팀")</code>' },
              { color:'green', title:'✍️ 집계까지 활용', text:'관리진행 학생 수 실시간 표시:\n<code>학생명단_CD.Filter(Status = "관리진행").Count()</code>\n\n담당자별 학생 수:\n<code>학생명단_CD.Filter(Counselor = thisRow.Name).Count()</code>' },
            ]
          },
          { type:'mcq', prompt:'Cross-doc 테이블 학생명단_CD에서 "영업팀" 학생만 필터하려면?', sub:'올바른 수식을 고르세요',
            options:['학생명단.Filter(Team = "영업팀")', '학생명단_CD.Filter(Team = "영업팀")', 'CrossDoc.Filter(학생명단, Team = "영업팀")', 'Import(학생명단_CD, "영업팀")'],
            answer:1, feedback:'정답! Cross-doc 테이블도 일반 테이블처럼 .Filter()를 그대로 사용하면 돼요. 이름만 다를 뿐 수식 방법은 동일합니다 💡'

            options:['각 팀이 독립적으로 데이터를 관리할 수 있다', '마스터 데이터가 바뀌면 모든 팀 문서에 자동 반영된다', '각 팀이 데이터를 직접 수정할 수 있다', '데이터가 여러 곳에 복사되어 안전하다'],
            answer:1, feedback:'정답! 마스터 DB 하나만 관리하면 연결된 모든 팀 문서에 자동 반영돼요. 데이터 불일치 걱정이 없어집니다 🏆'
          },
          { type:'fillblank', prompt:'빈칸을 채워 수식을 완성하세요', sub:'Cross-doc으로 가져온 담당자_CD 테이블에서 현재 팀의 담당자 수를 계산',
            sentence:'담당자_CD.___(Team = thisRow.TeamName).Count()', blanks:['Filter'],
            wordbank:['Filter','Select','Where','Find'],
            feedback:'정답! Cross-doc 테이블도 .Filter()를 똑같이 사용해요. 수식 방법은 일반 테이블과 동일합니다 ✅'
          },
          { type:'mcq', prompt:'Cross-doc 테이블을 Filter + Count와 함께 쓰면 어떤 것이 가능한가요?', sub:'실전 활용 범위',
            options:['불가능하다, Cross-doc은 집계 함수를 지원하지 않는다', '원본 문서의 실시간 데이터를 기반으로 집계를 자동 계산할 수 있다', 'Count만 가능하고 Sum, Average는 불가능하다', '동기화 주기는 하루에 한 번이라 실시간이 아니다'],
            answer:1, feedback:'완벽해요! Cross-doc + Filter + Count 조합으로 마스터 데이터 기반 실시간 집계 대시보드를 만들 수 있어요. 이게 코다의 진짜 강점입니다 💪'
          },
        ]
      },
    ]
  }
];

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let xp=0, completedCount=0, totalAns=0, correctAns=0;
let currentUnit=0;
let unitDone=[new Set(),new Set(),new Set(),new Set()];

// modal state
let curLesson=null, curStepIdx=0, hearts=3;
let fillState={};

// ═══════════════════════════════════════════════
// UNIT / LESSON RENDER
// ═══════════════════════════════════════════════
function selectUnit(id,btn){
  currentUnit=id;
  document.querySelectorAll('.unit-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderUnit();
}

function renderUnit(){
  const u=units[currentUnit];
  document.getElementById('unitEmoji').textContent=u.emoji;
  document.getElementById('unitTitle').textContent=u.title;
  document.getElementById('unitDesc').textContent=u.desc;
  const done=unitDone[currentUnit].size;
  const total=u.lessons.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('unitPct').textContent=pct+'%';
  document.getElementById('unitFill').style.width=pct+'%';

  const grid=document.getElementById('lessonsGrid');
  grid.innerHTML=u.lessons.map((l,i)=>{
    const isDone=unitDone[currentUnit].has(l.id);
    return `
      <div class="lesson-card ${isDone?'completed':''}" onclick="openLesson(${currentUnit},${i})">
        <div class="lesson-icon ${l.iconClass}">${l.icon}</div>
        <div class="lesson-info">
          <div class="lesson-title">${l.title}</div>
          <div class="lesson-desc">${l.steps.length}단계 학습</div>
          <div class="lesson-meta">
            <span class="lesson-tag tag-${l.tag}">${l.tag==='beginner'?'기초':'응용'}</span>
            <span class="lesson-tag tag-xp">⚡ ${l.xp} XP</span>
          </div>
        </div>
        <button class="start-btn ${isDone?'green':''}" onclick="event.stopPropagation();openLesson(${currentUnit},${i})">
          ${isDone?'복습':'시작'}
        </button>
      </div>
    `;
  }).join('');

  // practice
  renderPractice(u.practice);
}

function renderPractice(p){
  const el=document.getElementById('practiceArea');
  if(!p){el.innerHTML='';return;}
  const codeLines=p.code.split('\n').map(l=>l.startsWith('//')?`<span class="comment">${l}</span>`:l).join('\n');
  const stepsHTML=p.steps.map(s=>`
    <div class="practice-step">
      <div class="step-num">${s.n}</div>
      <div class="step-content">${s.text}</div>
    </div>
  `).join('');
  el.innerHTML=`
    <div class="practice-section">
      <div class="practice-label">🛠️ 실습</div>
      <h3>${p.title}</h3>
      <p>${p.desc}</p>
      <div class="practice-code">${codeLines}</div>
      <div class="practice-steps">${stepsHTML}</div>
    </div>
  `;
}

// ═══════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════
function openLesson(uIdx,lIdx){
  const lesson=units[uIdx].lessons[lIdx];
  curLesson={uIdx,lIdx,lesson};
  curStepIdx=0;
  hearts=3;
  fillState={};
  updateHearts();
  showModal();
  renderStep();
}

function showModal(){
  const o=document.getElementById('modalOverlay');
  o.classList.add('show');
  setTimeout(()=>o.classList.add('visible'),10);
}
function closeModal(){
  const o=document.getElementById('modalOverlay');
  o.classList.remove('visible');
  setTimeout(()=>o.classList.remove('show'),200);
}
function checkOverlayClose(e){
  if(e.target===document.getElementById('modalOverlay'))closeModal();
}

function updateProgress(){
  const total=curLesson.lesson.steps.length;
  const pct=Math.round(curStepIdx/total*100);
  document.getElementById('modalProgress').style.width=pct+'%';
}
function updateHearts(){
  document.getElementById('modalHearts').innerHTML='❤️'.repeat(hearts)+'🖤'.repeat(3-hearts);
}

function renderStep(){
  updateProgress();
  const step=curLesson.lesson.steps[curStepIdx];
  const body=document.getElementById('modalBody');
  body.innerHTML='';
  if(step.type==='explain') body.innerHTML=buildExplain(step);
  else if(step.type==='mcq') buildMCQ(step, body);
  else if(step.type==='fillblank') buildFill(step, body);
}

// ── EXPLAIN ──
function buildExplain(step){
  const boxes=step.boxes.map(b=>`
    <div class="concept-box ${b.color}">
      <h4>${b.title}</h4>
      <p>${b.text.replace(/\n/g,'<br>')}</p>
    </div>
  `).join('');
  return `
    <div class="lesson-explain">
      <span class="explain-emoji">${step.emoji}</span>
      <div class="explain-title">${step.title}</div>
      <div class="explain-subtitle">${step.subtitle}</div>
      ${boxes}
      <button class="start-btn green" style="width:100%;padding:14px;margin-top:16px;font-size:15px;border-radius:12px;" onclick="nextStep()">
        이해했어요! →
      </button>
    </div>
  `;
}

// ── MCQ ──
// KEY FIX: store step in a module-level variable, use index-based onclick
let currentMCQStep=null;
function buildMCQ(step, body){
  currentMCQStep=step;
  const letters=['A','B','C','D'];
  const opts=step.options.map((o,i)=>`
    <button class="option-btn bounce-in" style="animation-delay:${i*0.05}s" onclick="selectMCQ(${i})">
      <div class="option-letter">${letters[i]}</div>
      <span>${o}</span>
    </button>
  `).join('');
  body.innerHTML=`
    <div class="quiz-prompt">${step.prompt.replace(/\n/g,'<br>')}</div>
    <div class="quiz-subtext">${step.sub}</div>
    <div class="options-grid">${opts}</div>
    <div class="feedback-banner" id="feedbackBanner">
      <div class="fb-top"><span class="fb-icon"></span><span class="fb-title"></span></div>
      <div class="fb-text"></div>
      <button class="fb-continue" onclick="nextStep()">계속하기</button>
    </div>
  `;
}

function selectMCQ(idx){
  const step=currentMCQStep;
  if(!step) return;
  const btns=document.querySelectorAll('.option-btn');
  if(btns[0].classList.contains('correct')||btns[0].classList.contains('wrong')||btns[0].classList.contains('dimmed')) return; // already answered
  const isCorrect=(idx===step.answer);
  btns.forEach((b,i)=>{
    if(i===step.answer) b.classList.add('reveal');
    else if(i===idx&&!isCorrect) b.classList.add('wrong');
    else b.classList.add('dimmed');
  });
  totalAns++; if(isCorrect){correctAns++;} else{hearts=Math.max(0,hearts-1);updateHearts();}
  showFeedback(isCorrect, isCorrect?'잘했어요! 🎉':'아쉽지만 괜찮아요!', step.feedback);
  updateStats();
}

// ── FILL BLANK ──
let currentFillStep=null;
function buildFill(step, body){
  currentFillStep=step;
  fillState={filled:null,filledIdx:null};
  const sentHTML=step.sentence.replace('___','<span class="blank-slot" id="blankSlot" onclick="clearBlank()"></span>');
  const bankHTML=step.wordbank.map((w,i)=>`
    <div class="word-tile" id="tile${i}" onclick="fillBlank(${i},'${w.replace(/'/g,"\\'")}')">
      ${w}
    </div>
  `).join('');
  body.innerHTML=`
    <div class="quiz-prompt">${step.prompt}</div>
    <div class="quiz-subtext">${step.sub}</div>
    <div class="sentence-wrap">${sentHTML}</div>
    <div class="word-bank">${bankHTML}</div>
    <button class="check-btn" id="checkBtn" onclick="checkFill()">확인하기 ✓</button>
    <div class="feedback-banner" id="feedbackBanner">
      <div class="fb-top"><span class="fb-icon"></span><span class="fb-title"></span></div>
      <div class="fb-text"></div>
      <button class="fb-continue" onclick="nextStep()">계속하기</button>
    </div>
  `;
}

function fillBlank(idx,word){
  if(fillState.filledIdx!==null){
    const prev=document.getElementById('tile'+fillState.filledIdx);
    if(prev) prev.classList.remove('used');
  }
  fillState.filled=word;
  fillState.filledIdx=idx;
  document.getElementById('tile'+idx).classList.add('used');
  const slot=document.getElementById('blankSlot');
  slot.textContent=word;
  slot.classList.add('filled');
  document.getElementById('checkBtn').style.display='block';
}
function clearBlank(){
  if(fillState.filledIdx!==null){
    const t=document.getElementById('tile'+fillState.filledIdx);
    if(t) t.classList.remove('used');
  }
  fillState={filled:null,filledIdx:null};
  const slot=document.getElementById('blankSlot');
  slot.textContent='';
  slot.classList.remove('filled');
  document.getElementById('checkBtn').style.display='none';
}
function checkFill(){
  const step=currentFillStep;
  if(!step||fillState.filled===null) return;
  document.querySelectorAll('.word-tile').forEach(t=>t.style.pointerEvents='none');
  document.getElementById('checkBtn').style.display='none';
  const isCorrect=fillState.filled===step.blanks[0];
  const slot=document.getElementById('blankSlot');
  slot.classList.add(isCorrect?'correct':'wrong');
  totalAns++; if(isCorrect){correctAns++;} else{hearts=Math.max(0,hearts-1);updateHearts();}
  showFeedback(isCorrect,isCorrect?'완벽해요! 🎉':'다시 확인해봐요!',isCorrect?step.feedback:`정답은 "${step.blanks[0]}"이에요. ${step.feedback}`);
  updateStats();
}

// ── FEEDBACK & NEXT ──
function showFeedback(ok,title,text){
  const b=document.getElementById('feedbackBanner');
  b.className='feedback-banner show '+(ok?'correct-fb':'wrong-fb');
  b.querySelector('.fb-icon').textContent=ok?'✅':'❌';
  b.querySelector('.fb-title').textContent=title;
  b.querySelector('.fb-text').textContent=text;
}

function nextStep(){
  curStepIdx++;
  if(curStepIdx>=curLesson.lesson.steps.length){showCompletion();return;}
  currentMCQStep=null; currentFillStep=null;
  document.getElementById('modalBody').innerHTML='';
  setTimeout(()=>renderStep(),30);
}

function showCompletion(){
  const lesson=curLesson.lesson;
  const alreadyDone=unitDone[curLesson.uIdx].has(lesson.id);
  if(!alreadyDone){unitDone[curLesson.uIdx].add(lesson.id);addXP(lesson.xp);completedCount++;}
  document.getElementById('modalProgress').style.width='100%';
  document.getElementById('modalBody').innerHTML=`
    <div class="completion-screen">
      <span class="completion-trophy">🏆</span>
      <div class="completion-title">레슨 완료!</div>
      <div class="completion-sub">"${lesson.title}" 학습을 마쳤어요</div>
      <div><div class="xp-earned">⚡ +${alreadyDone?0:lesson.xp} XP 획득!</div></div>
      <br>
      <button class="completion-btn" onclick="closeModal();renderUnit();">계속 배우기 →</button>
    </div>
  `;
  renderUnit(); updateStars();
}

// ── XP / STATS ──
function addXP(amount){
  xp+=amount;
  document.getElementById('xpVal').textContent=xp;
  document.getElementById('statXP').textContent=xp;
  document.getElementById('xpFill').style.width=Math.min((xp%100)/100*100,100)+'%';
}
function updateStats(){
  document.getElementById('statDone').textContent=completedCount;
  document.getElementById('statAcc').textContent=totalAns>0?Math.round(correctAns/totalAns*100)+'%':'—';
}
function updateStars(){
  units.forEach((u,i)=>{
    const done=unitDone[i].size, total=u.lessons.length;
    const el=document.getElementById('stars'+i);
    if(!el) return;
    el.textContent=done===0?'☆':done<total?'⭐☆':'⭐⭐';
  });
}

// ── INIT ──
renderUnit();
</script>
</body>
</html>
